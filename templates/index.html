<!DOCTYPE html>
<html>
<head>
    <title>Rahmane_Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        nav { background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        nav h1 { color: white; font-size: 24px; }
        .nav-btns { display: flex; gap: 10px; }
        .panier-nav { background: white; color: #764ba2; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 400px; margin: 30px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card h2 { color: #764ba2; margin-bottom: 20px; text-align: center; }
        .msg-erreur { color: red; text-align: center; margin-top: 10px; }
        .msg-succes { color: green; text-align: center; margin-top: 10px; }
        #admin { background: linear-gradient(135deg, #f093fb, #f5576c); padding: 25px; border-radius: 15px; margin-bottom: 30px; color: white; display: none; }
        #admin h2 { margin-bottom: 15px; }
        .admin-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        #commandes-panel { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; display: none; }
        #commandes-panel h2 { color: #764ba2; margin-bottom: 15px; }
        .commande-card { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .commande-card h4 { color: #333; margin-bottom: 5px; }
        .commande-card p { color: #666; font-size: 14px; }
        .statut-select { padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd; margin-top: 5px; }
        input { padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; width: 100%; margin-bottom: 10px; }
        input:focus { border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; transition: transform 0.2s; width: 100%; margin-top: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-violet { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-vert { background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; }
        .btn-rouge { background: linear-gradient(135deg, #f5576c, #f093fb); color: white; }
        .btn-orange { background: linear-gradient(135deg, #f7971e, #ffd200); color: white; }
        .btn-gris { background: #e0e0e0; color: #333; }
        .produits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .produit { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .produit:hover { transform: translateY(-5px); }
        .produit-header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 30px 20px; text-align: center; font-size: 50px; }
        .produit-body { padding: 20px; }
        .produit-nom { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .produit-prix { font-size: 22px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .produit-stock { color: #999; font-size: 13px; margin-bottom: 15px; }
        .produit-actions { display: flex; flex-direction: column; gap: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal { position: fixed; top: 0; right: 0; width: 420px; height: 100%; background: white; z-index: 101; padding: 30px; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s; box-shadow: -5px 0 30px rgba(0,0,0,0.2); }
        .modal.ouvert { transform: translateX(0); }
        .overlay.ouvert { display: block; }
        .modal h2 { color: #764ba2; margin-bottom: 20px; }
        .panier-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .panier-total { margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 15px; color: white; text-align: center; font-size: 20px; font-weight: bold; }
        .badge { background: #f5576c; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
        .titre-section { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .sous-titre { color: #999; margin-bottom: 20px; }
        .form-commande input { width: 100%; margin-bottom: 10px; }
        .bienvenue { background: linear-gradient(135deg, #43e97b, #38f9d7); padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; color: white; font-weight: bold; display: none; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <nav>
        <h1>🛍️ Rahmane_Shop</h1>
        <div class="nav-btns">
            <button class="panier-nav" id="btn-commandes" style="display:none" onclick="toggleCommandes()">📋 Commandes</button>
            <button class="panier-nav" onclick="togglePanier()">🛒 Panier <span class="badge" id="badge">0</span></button>
        </div>
    </nav>

    <div class="container">

        <!-- BIENVENUE -->
        <div class="bienvenue" id="bienvenue">
            <span id="bienvenue-msg"></span>
            <button class="btn btn-gris" style="width:auto" onclick="seDeconnecter()">Se déconnecter</button>
        </div>

        <!-- LOGIN -->
        <div class="card" id="login-form">
            <h2>🔐 Connexion</h2>
            <input id="username" type="text" placeholder="Nom d'utilisateur ou email">
            <input id="password" type="password" placeholder="Mot de passe">
            <button class="btn btn-violet" onclick="seConnecter()">Se connecter</button>
            <p id="login-msg" class="msg-erreur"></p>
            <p style="text-align:center;margin-top:15px;color:#999">Pas de compte ? <a href="/inscription-page" style="color:#667eea;font-weight:bold">S'inscrire</a></p>
        </div>

        <!-- CODE VERIFICATION -->
        <div class="card" id="code-form" style="display:none">
            <h2>📧 Vérification</h2>
            <p style="text-align:center;color:#999;margin-bottom:15px">Code envoyé sur votre email</p>
            <input id="code" type="text" placeholder="Entrez le code à 6 chiffres">
            <button class="btn btn-violet" onclick="verifierCode()">Vérifier</button>
            <p id="code-msg" class="msg-erreur"></p>
        </div>

        <!-- ADMIN -->
        <div id="admin">
            <h2>⚙️ Panel Admin</h2>
            <div class="admin-form">
                <input id="nom" type="text" placeholder="Nom du produit" style="width:200px">
                <input id="prix" type="number" placeholder="Prix (FCFA)" style="width:150px">
                <input id="stock" type="number" placeholder="Stock" style="width:100px">
                <button class="btn btn-vert" style="width:auto" onclick="ajouterProduit()">➕ Ajouter</button>
            </div>
        </div>

        <!-- COMMANDES -->
        <div id="commandes-panel">
            <h2>📋 Commandes reçues</h2>
            <div id="liste-commandes"></div>
        </div>

        <!-- PRODUITS -->
        <p class="titre-section">Nos Produits</p>
        <p class="sous-titre">Découvrez notre sélection</p>
        <div class="produits-grid" id="produits"></div>
    </div>

    <div class="overlay" id="overlay" onclick="fermerTout()"></div>

    <div class="modal" id="panier-modal">
        <h2>🛒 Mon Panier</h2>
        <div id="liste-panier"></div>
        <div class="panier-total">Total : <span id="total">0</span> FCFA</div>
        <div id="form-commande" style="display:none;margin-top:20px">
            <h3 style="color:#764ba2;margin-bottom:15px">📦 Livraison</h3>
            <input id="nom-client" type="text" placeholder="Votre nom complet">
            <input id="telephone" type="text" placeholder="Téléphone">
            <input id="adresse" type="text" placeholder="Adresse de livraison">
            <button class="btn btn-vert" onclick="passerCommande()">✅ Confirmer</button>
        </div>
        <button class="btn btn-violet" style="margin-top:15px" onclick="toggleFormCommande()" id="btn-commander">📦 Commander</button>
        <button class="btn btn-rouge" style="margin-top:10px" onclick="viderPanier()">🗑️ Vider</button>
        <button class="btn btn-gris" style="margin-top:10px" onclick="fermerTout()">Fermer</button>
    </div>

    <script>
        let panier = [];
        let estAdmin = false;
        let estConnecte = false;
        let emailVerif = '';
        const emojis = ['📱', '🎧', '🔌', '💻', '⌨️', '🖥️', '📷', '🎮'];

        function seConnecter() {
            let username = document.getElementById('username').value;
            let password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('login-msg').innerText = 'Remplissez tous les champs !';
                return;
            }
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(r => r.json())
            .then(data => {
                if (data.erreur) {
                    document.getElementById('login-msg').innerText = data.erreur;
                } else if (data.role === 'admin') {
                    connecterAdmin(data.username);
                } else if (data.message === 'code_envoye') {
                    emailVerif = data.email;
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('code-form').style.display = 'block';
                }
            });
        }

        function verifierCode() {
            let code = document.getElementById('code').value;
            fetch('/verifier-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: emailVerif, code})
            })
            .then(r => r.json())
            .then(data => {
                if (data.erreur) {
                    document.getElementById('code-msg').innerText = data.erreur;
                } else {
                    connecterClient();
                }
            });
        }

        function connecterAdmin(username) {
            estAdmin = true;
            estConnecte = true;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('code-form').style.display = 'none';
            document.getElementById('admin').style.display = 'block';
            document.getElementById('btn-commandes').style.display = 'block';
            document.getElementById('commandes-panel').style.display = 'block';
            document.getElementById('bienvenue').style.display = 'flex';
            document.getElementById('bienvenue-msg').innerText = '👑 Admin connecté : ' + username;
            chargerCommandes();
            chargerProduits();
        }

        function connecterClient() {
            estConnecte = true;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('code-form').style.display = 'none';
            document.getElementById('bienvenue').style.display = 'flex';
            document.getElementById('bienvenue-msg').innerText = '👋 Bienvenue !';
            chargerProduits();
        }

        function seDeconnecter() {
            estAdmin = false;
            estConnecte = false;
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('admin').style.display = 'none';
            document.getElementById('commandes-panel').style.display = 'none';
            document.getElementById('btn-commandes').style.display = 'none';
            document.getElementById('bienvenue').style.display = 'none';
            chargerProduits();
        }

        function chargerProduits() {
            fetch('/produits')
            .then(r => r.json())
            .then(data => {
                let html = '';
                data.forEach((p, i) => {
                    html += '<div class="produit"><div class="produit-header">' + emojis[i % emojis.length] + '</div>';
                    html += '<div class="produit-body"><div class="produit-nom">' + p.nom + '</div>';
                    html += '<div class="produit-prix">' + p.prix.toLocaleString() + ' FCFA</div>';
                    html += '<div class="produit-stock">Stock : ' + p.stock + '</div>';
                    html += '<div class="produit-actions">';
                    if (estConnecte) {
                        html += '<button class="btn btn-violet" onclick="ajouterPanier(' + p.id + ', \'' + p.nom + '\', ' + p.prix + ')">🛒 Ajouter au panier</button>';
                    } else {
                        html += '<button class="btn btn-gris" onclick="alert(\'Connectez-vous pour acheter !\')">🔒 Connectez-vous</button>';
                    }
                    if (estAdmin) {
                        html += '<button class="btn btn-orange" onclick="modifierProduit(' + p.id + ', \'' + p.nom + '\', ' + p.prix + ', ' + p.stock + ')">✏️ Modifier</button>';
                        html += '<button class="btn btn-rouge" onclick="supprimerProduit(' + p.id + ')">🗑️ Supprimer</button>';
                    }
                    html += '</div></div></div>';
                });
                document.getElementById('produits').innerHTML = html;
            });
        }

        function chargerCommandes() {
            fetch('/commandes')
            .then(r => r.json())
            .then(data => {
                let html = '';
                if (data.length === 0) { html = '<p style="color:#999">Aucune commande.</p>'; }
                data.forEach(c => {
                    html += '<div class="commande-card">';
                    html += '<h4>Commande #' + c.id + ' — ' + c.nom_client + '</h4>';
                    html += '<p>📞 ' + c.telephone + ' | 📍 ' + c.adresse + '</p>';
                    html += '<p>💰 ' + c.total.toLocaleString() + ' FCFA</p>';
                    html += '<select class="statut-select" onchange="modifierStatut(' + c.id + ', this.value)">';
                    html += '<option value="en attente"' + (c.statut === 'en attente' ? ' selected' : '') + '>⏳ En attente</option>';
                    html += '<option value="confirme"' + (c.statut === 'confirme' ? ' selected' : '') + '>✅ Confirmé</option>';
                    html += '<option value="livre"' + (c.statut === 'livre' ? ' selected' : '') + '>🚚 Livré</option>';
                    html += '</select></div>';
                });
                document.getElementById('liste-commandes').innerHTML = html;
            });
        }

        function modifierStatut(id, statut) {
            fetch('/commandes/' + id + '/statut', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({statut})
            });
        }

        function toggleCommandes() {
            let panel = document.getElementById('commandes-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            chargerCommandes();
        }

        function ajouterProduit() {
            let nom = document.getElementById('nom').value;
            let prix = parseInt(document.getElementById('prix').value);
            let stock = parseInt(document.getElementById('stock').value);
            if (!nom || !prix || !stock) { alert('Remplissez tous les champs !'); return; }
            fetch('/produits/ajouter', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nom, prix, stock})
            }).then(() => {
                chargerProduits();
                document.getElementById('nom').value = '';
                document.getElementById('prix').value = '';
                document.getElementById('stock').value = '';
            });
        }

        function supprimerProduit(id) {
            if (!confirm('Supprimer ce produit ?')) return;
            fetch('/produits/supprimer/' + id, {method: 'DELETE'}).then(() => chargerProduits());
        }

        function modifierProduit(id, nom, prix, stock) {
            let nouveauNom = prompt('Nouveau nom :', nom);
            let nouveauPrix = prompt('Nouveau prix :', prix);
            let nouveauStock = prompt('Nouveau stock :', stock);
            if (!nouveauNom || !nouveauPrix || !nouveauStock) return;
            fetch('/produits/modifier/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nom: nouveauNom, prix: parseInt(nouveauPrix), stock: parseInt(nouveauStock)})
            }).then(() => chargerProduits());
        }

        function ajouterPanier(id, nom, prix) {
            let existant = panier.find(p => p.id === id);
            if (existant) { existant.quantite++; }
            else { panier.push({id, nom, prix, quantite: 1}); }
            afficherPanier();
            togglePanier();
        }

        function supprimerArticle(id) {
            panier = panier.filter(p => p.id !== id);
            afficherPanier();
        }

        function viderPanier() { panier = []; afficherPanier(); }

        function toggleFormCommande() {
            let form = document.getElementById('form-commande');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function passerCommande() {
            let nom_client = document.getElementById('nom-client').value;
            let telephone = document.getElementById('telephone').value;
            let adresse = document.getElementById('adresse').value;
            if (!nom_client || !telephone || !adresse) { alert('Remplissez tous les champs !'); return; }
            if (panier.length === 0) { alert('Panier vide !'); return; }
            let total = panier.reduce((sum, p) => sum + p.prix * p.quantite, 0);
            let items = panier.map(p => ({nom: p.nom, quantite: p.quantite, prix: p.prix}));
            fetch('/commandes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nom_client, telephone, adresse, total, items})
            })
            .then(r => r.json())
            .then(data => {
                alert('✅ Commande #' + data.id + ' passée !');
                viderPanier();
                fermerTout();
            });
        }

        function afficherPanier() {
            let html = '';
            let total = 0;
            panier.forEach(p => {
                html += '<div class="panier-item"><div><b>' + p.nom + '</b><br><small>x' + p.quantite + '</small></div><div><b style="color:#667eea">' + (p.prix * p.quantite).toLocaleString() + ' FCFA</b><br><button class="btn btn-rouge" style="padding:5px;width:auto;margin-top:5px" onclick="supprimerArticle(' + p.id + ')">Retirer</button></div></div>';
                total += p.prix * p.quantite;
            });
            if (panier.length === 0) html = '<p style="color:#999;text-align:center;margin-top:20px">Panier vide</p>';
            document.getElementById('liste-panier').innerHTML = html;
            document.getElementById('total').innerText = total.toLocaleString();
            document.getElementById('badge').innerText = panier.length;
        }

        function togglePanier() {
            document.getElementById('panier-modal').classList.toggle('ouvert');
            document.getElementById('overlay').classList.toggle('ouvert');
        }

        function fermerTout() {
            document.getElementById('panier-modal').classList.remove('ouvert');
            document.getElementById('overlay').classList.remove('ouvert');
        }

        chargerProduits();
    </script>
</body>
</html>
